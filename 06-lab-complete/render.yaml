version: "1"

previews:
  generation: off

envVarGroups:
  - name: agentic-job-hunter-shared
    envVars:
      - key: APP_NAME
        value: Agentic Job Hunter
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: MODEL_TEMPERATURE
        value: "0.2"
      - key: OPENAI_TIMEOUT_SECONDS
        value: "30"
      - key: GEMINI_TIMEOUT_SECONDS
        value: "30"
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "800"
      - key: GEMINI_MAX_OUTPUT_TOKENS
        value: "800"
      - key: RATE_LIMIT_REQUESTS
        value: "10"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: MONTHLY_BUDGET_USD
        value: "10.00"
      - key: REQUEST_RESERVE_USD
        value: "0.25"
      - key: SESSION_TTL_SECONDS
        value: "604800"
      - key: HISTORY_MAX_MESSAGES
        value: "20"
      - key: GRACEFUL_SHUTDOWN_TIMEOUT_SECONDS
        value: "20"
      - key: OPENAI_INPUT_PRICE_PER_1K_USD
        value: "0.00015"
      - key: OPENAI_OUTPUT_PRICE_PER_1K_USD
        value: "0.00060"
      - key: GEMINI_INPUT_PRICE_PER_1K_USD
        value: "0.00010"
      - key: GEMINI_OUTPUT_PRICE_PER_1K_USD
        value: "0.00040"

services:
  - type: keyvalue
    name: agentic-job-hunter-redis
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: agentic-job-hunter-web
    runtime: docker
    dockerfilePath: 06-lab-complete/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    autoDeployTrigger: commit
    healthCheckPath: /ready
    # maxShutdownDelaySeconds: 30
    envVars:
      - fromGroup: agentic-job-hunter-shared
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          name: agentic-job-hunter-redis
          type: keyvalue
          property: connectionString
      - key: AGENT_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false